name: validate

# Release gate for the controller design: every push/PR re-derives the model and
# asserts the flight invariants (closed-loop stable, torque headroom, gains match the
# committed Kc_real.npy, encoder path tracks truth) before anything reaches hardware.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync env (incl. dev group)
        run: uv sync --group dev

      # No rendering here, so MuJoCo runs headless with no GL/display needed.
      - name: Run design gates
        run: uv run --group dev pytest -q

      - name: Smoke-test the stats report
        run: uv run python scripts/report_stats.py
