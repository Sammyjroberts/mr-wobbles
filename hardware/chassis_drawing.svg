<svg xmlns="http://www.w3.org/2000/svg" width="560" height="470" viewBox="0 0 560 470" role="img">
<rect width="560" height="470" fill="#FBFAF7"/>
<defs><marker id="a" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5"/></marker></defs>
<text x="280" y="26" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="600" fill="#3A3A37">Mr. Wobbles v4 - box on K-legs (front view)</text>

<!-- K-legs: braced truss each side (spine + two diagonals meeting at a knee) -->
<g stroke="#C9A07A" stroke-width="12" stroke-linecap="round" fill="none">
  <line x1="214" y1="230" x2="198" y2="360"/>
  <line x1="168" y1="238" x2="236" y2="300"/>
  <line x1="236" y1="300" x2="202" y2="356"/>
  <line x1="346" y1="230" x2="362" y2="360"/>
  <line x1="392" y1="238" x2="324" y2="300"/>
  <line x1="324" y1="300" x2="358" y2="356"/>
</g>
<text x="300" y="300" font-family="sans-serif" font-size="10.5" fill="#B58A5E">braced K-leg</text>

<!-- motors in the feet -->
<rect x="152" y="360" width="70" height="30" rx="4" fill="#C7CBD1" stroke="#6E7378" stroke-width="1.2"/>
<rect x="338" y="360" width="70" height="30" rx="4" fill="#C7CBD1" stroke="#6E7378" stroke-width="1.2"/>

<!-- wheels, edge-on -->
<ellipse cx="122" cy="375" rx="9" ry="60" fill="#3B3F49" stroke="#23262C" stroke-width="1.2"/>
<ellipse cx="438" cy="375" rx="9" ry="60" fill="#3B3F49" stroke="#23262C" stroke-width="1.2"/>
<text x="106" y="446" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#9A988F">wheel (edge-on)</text>
<text x="454" y="446" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="#9A988F">wheel (edge-on)</text>

<!-- box body: enclosure riding high, 118 x 88 mm -->
<rect x="162" y="62" width="236" height="176" rx="8" fill="#EBE9E2" stroke="#888780" stroke-width="1.5"/>
<rect x="162" y="56" width="236" height="10" rx="4" fill="#E1DFD6" stroke="#888780" stroke-width="1.2"/>
<text x="404" y="64" font-family="sans-serif" font-size="10" fill="#9A988F">clamshell lid</text>
<rect x="206" y="120" width="148" height="34" rx="3" fill="#F6E2D6" stroke="#B8460F" stroke-width="1.1"/>
<text x="280" y="141" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#B8460F">3S LiPo (high)</text>
<rect x="206" y="188" width="148" height="26" rx="3" fill="#E4EFEA" stroke="#2E6F57" stroke-width="1.1"/>
<text x="280" y="205" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#2E6F57">Pico + TB6612 + IMU</text>

<!-- axle line -->
<line x1="72" y1="375" x2="488" y2="375" stroke="#B8460F" stroke-width="0.8" stroke-dasharray="5 4"/>
<text x="72" y="369" font-family="sans-serif" font-size="10" fill="#B8460F">wheel axle = mesh origin (Y=0)</text>

<!-- CoM / L marker -->
<circle cx="360" cy="273" r="4" fill="#7A4FB5"/>
<line x1="360" y1="375" x2="360" y2="273" stroke="#7A4FB5" stroke-width="0.9" marker-start="url(#a)" marker-end="url(#a)"/>
<text x="366" y="328" font-family="sans-serif" font-size="10.5" fill="#7A4FB5">L = 51 mm (CoM above axle)</text>

<!-- dims -->
<line x1="162" y1="46" x2="398" y2="46" stroke="#9A988F" stroke-width="0.8" marker-start="url(#a)" marker-end="url(#a)"/>
<text x="280" y="40" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3A3A37">118 mm</text>
<line x1="414" y1="62" x2="414" y2="238" stroke="#9A988F" stroke-width="0.8" marker-start="url(#a)" marker-end="url(#a)"/>
<text x="420" y="152" font-family="sans-serif" font-size="11" fill="#3A3A37">88 mm</text>
<line x1="122" y1="462" x2="438" y2="462" stroke="#9A988F" stroke-width="0.8" marker-start="url(#a)" marker-end="url(#a)"/>
<text x="280" y="456" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3A3A37">146 mm track</text>
</svg>
